services:
  - type: web
    name: oceanica-api
    runtime: node
    repo: https://github.com/yourusername/oceanica-api
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 30d
      - key: DATABASE_URL
        fromDatabase:
          name: oceanica-db
          property: connectionString
    buildCommand: npm install && npm run db:init && npm run db:seed
    startCommand: npm start

databases:
  - name: oceanica-db
    plan: free