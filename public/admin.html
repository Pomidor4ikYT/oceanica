<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Адмін-панель — Oceanica Travel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <div id="loading-spinner" class="loading-spinner">🌊 Завантаження...</div>
  
  <div id="app-content" style="display: none;">
    <header class="admin-header">
      <div class="brand">
        <div class="brand-bubble">🌊</div>
        <div class="brand-name">Oceanica Travel Admin</div>
      </div>
      <nav class="admin-nav">
        <div id="userSection" class="user-section"></div>
      </nav>
    </header>

    <div class="admin-container">
      <div class="admin-tabs">
        <button class="admin-tab active" data-tab="tours">✈️ Тури</button>
        <button class="admin-tab" data-tab="cruises">🚢 Круїзи</button>
        <button class="admin-tab" data-tab="islands">🏝️ Острови</button>
        <button class="admin-tab" data-tab="hot">🔥 Гарячі путівки</button>
        <button class="admin-tab" data-tab="users">👥 Користувачі</button>
        <button class="admin-tab" data-tab="bookings">📋 Всі бронювання</button>
      </div>

      <div class="admin-content">
        <!-- Тури -->
        <div class="tab-content active" id="tours-tab">
          <div class="admin-toolbar">
            <h2>✈️ Управління турами</h2>
          </div>
          <div class="items-grid" id="tours-grid">
            <div class="add-card" onclick="openAddModal('tour')">
              <div class="add-card-content">
                <span class="add-icon">+</span>
                <span class="add-text">Додати тур</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Круїзи -->
        <div class="tab-content" id="cruises-tab">
          <div class="admin-toolbar">
            <h2>🚢 Управління круїзами</h2>
          </div>
          <div class="items-grid" id="cruises-grid">
            <div class="add-card" onclick="openAddModal('cruise')">
              <div class="add-card-content">
                <span class="add-icon">+</span>
                <span class="add-text">Додати круїз</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Острови -->
        <div class="tab-content" id="islands-tab">
          <div class="admin-toolbar">
            <h2>🏝️ Управління островами</h2>
          </div>
          <div class="items-grid" id="islands-grid">
            <div class="add-card" onclick="openAddModal('island')">
              <div class="add-card-content">
                <span class="add-icon">+</span>
                <span class="add-text">Додати острів</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Гарячі путівки -->
        <div class="tab-content" id="hot-tab">
          <div class="admin-toolbar">
            <h2>🔥 Управління гарячими путівками</h2>
          </div>
          <div class="items-grid" id="hot-grid">
            <div class="add-card" onclick="openAddModal('hot')">
              <div class="add-card-content">
                <span class="add-icon">+</span>
                <span class="add-text">Додати путівку</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Користувачі -->
        <div class="tab-content" id="users-tab">
          <div class="admin-toolbar">
            <h2>👥 Користувачі</h2>
          </div>
          <div class="users-table" id="users-grid"></div>
        </div>

        <!-- Всі бронювання -->
        <div class="tab-content" id="bookings-tab">
          <div class="admin-toolbar">
            <h2>📋 Всі бронювання</h2>
          </div>
          <div class="bookings-table" id="bookings-grid"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Модальне вікно для додавання/редагування -->
  <div id="itemModal" class="modal-overlay">
    <div class="modal-container modal-large">
      <div class="modal-header">
        <h2 id="modalTitle">Додати тур</h2>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-content">
        <form id="itemForm">
          <input type="hidden" id="itemId">
          <input type="hidden" id="itemType">
          
          <div class="form-row">
            <div class="form-group">
              <label>Назва *</label>
              <input type="text" id="title" class="form-input" required placeholder="Наприклад: Таїланд: Пхукет">
            </div>
            <div class="form-group">
              <label>Ціна *</label>
              <input type="text" id="price" class="form-input" placeholder="35 960 грн" required>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Тривалість</label>
              <input type="text" id="duration" class="form-input" placeholder="7 ночей">
            </div>
            <div class="form-group">
              <label>Розмір групи</label>
              <input type="text" id="groupSize" class="form-input" placeholder="До 30 осіб">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Проживання</label>
              <input type="text" id="accommodation" class="form-input" placeholder="Готель 4*">
            </div>
            <div class="form-group">
              <label>Бейдж</label>
              <select id="badge" class="form-select">
                <option value="">Оберіть бейдж</option>
                <option value="🔥 Гаряча пропозиція">🔥 Гаряча пропозиція</option>
                <option value="🏖️ Пляжний">🏖️ Пляжний</option>
                <option value="🏛️ Екскурсійний">🏛️ Екскурсійний</option>
                <option value="⛰️ Гірський">⛰️ Гірський</option>
                <option value="🏝️ Тропічний">🏝️ Тропічний</option>
                <option value="🌋 Вулканічний">🌋 Вулканічний</option>
                <option value="✨ Екзотичний">✨ Екзотичний</option>
                <option value="☀️ Теплі води">☀️ Теплі води</option>
                <option value="❄️ Холодні води">❄️ Холодні води</option>
                <option value="🌊 Помірні води">🌊 Помірні води</option>
                <option value="-20%">-20%</option>
                <option value="-15%">-15%</option>
                <option value="-10%">-10%</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Категорія</label>
              <select id="category" class="form-select">
                <option value="">Оберіть категорію</option>
                <option value="beach">🏖️ Пляжний</option>
                <option value="excursion">🏛️ Екскурсійний</option>
                <option value="mountain">⛰️ Гірський</option>
                <option value="tropical">🏝️ Тропічний</option>
                <option value="volcanic">🌋 Вулканічний</option>
                <option value="exotic">✨ Екзотичний</option>
                <option value="warm">☀️ Теплі води</option>
                <option value="cold">❄️ Холодні води</option>
                <option value="temperate">🌊 Помірні води</option>
                <option value="lux">💎 Люкс</option>
                <option value="history">📜 Історія</option>
                <option value="nature">🌿 Природа</option>
              </select>
            </div>
            <div class="form-group">
              <label>Мета (короткий опис)</label>
              <input type="text" id="meta" class="form-input" placeholder="All Inclusive • 7 ночей">
            </div>
          </div>

          <div class="form-group">
            <label>Посилання на зображення</label>
            <div class="image-selector">
              <select id="image-select" class="form-select" onchange="updateImageInput()">
                <option value="">Оберіть існуюче зображення</option>
                <option value="toursimg/tour1.jpg">Таїланд</option>
                <option value="toursimg/tour2.jpg">Італія</option>
                <option value="toursimg/tour3.jpg">Непал</option>
                <option value="toursimg/tour4.jpg">Мальдіви</option>
                <option value="toursimg/tour5.jpg">Франція</option>
                <option value="toursimg/tour6.jpg">Швейцарія</option>
                <option value="toursimg/tour7.jpg">Єгипет</option>
                <option value="toursimg/tour8.jpg">Греція</option>
                <option value="toursimg/tour9.jpg">Перу</option>
                <option value="toursimg/tour10.jpg">Балі</option>
                <option value="toursimg/tour11.jpg">Ісландія</option>
                <option value="toursimg/tour12.jpg">Японія</option>
                <option value="cruiseimg/cruise1.jpg">Круїз 1</option>
                <option value="cruiseimg/cruise2.jpg">Круїз 2</option>
                <option value="cruiseimg/cruise3.jpg">Круїз 3</option>
                <option value="cruiseimg/cruise4.jpg">Круїз 4</option>
                <option value="islandimg/island1.jpg">Мальдіви (острів)</option>
                <option value="islandimg/island2.jpg">Ісландія (острів)</option>
                <option value="islandimg/island3.jpg">Бора-Бора</option>
                <option value="islandimg/island4.jpg">Сейшели</option>
                <option value="indeximg/bar1.jpg">Бар 1</option>
                <option value="indeximg/bar2.jpg">Бар 2</option>
                <option value="indeximg/bar3.jpg">Бар 3</option>
                <option value="indeximg/bar4.jpg">Бар 4</option>
              </select>
              <span style="margin: 0 10px;">або</span>
              <input type="text" id="image" class="form-input" placeholder="Введіть свій шлях до зображення">
            </div>
          </div>

          <div class="form-group">
            <label>Опис</label>
            <textarea id="description" class="form-textarea" rows="3" placeholder="Детальний опис туру..."></textarea>
          </div>

          <div class="form-group">
            <label>Дати вильотів (через кому, формат ДД.ММ.РРРР)</label>
            <input type="text" id="departureDates" class="form-input" placeholder="15.03.2026, 22.03.2026, 29.03.2026">
          </div>

          <div class="form-group">
            <label>Теги (чипси, через кому)</label>
            <div class="tags-selector">
              <select id="tags-select" class="form-select" onchange="addTagFromSelect()">
                <option value="">Оберіть тег</option>
                <option value="Пляжі">🏖️ Пляжі</option>
                <option value="Античність">🏛️ Античність</option>
                <option value="Гори">⛰️ Гори</option>
                <option value="Дайвінг">🤿 Дайвінг</option>
                <option value="SPA">💆 SPA</option>
                <option value="Екскурсії">🚌 Екскурсії</option>
                <option value="Романтика">💕 Романтика</option>
                <option value="Пригоди">🧗 Пригоди</option>
                <option value="All Inclusive">🍹 All Inclusive</option>
                <option value="Сніданки">🍳 Сніданки</option>
                <option value="Вілли">🏡 Вілли</option>
                <option value="Бунгало">🏠 Бунгало</option>
                <option value="Лагуна">🌊 Лагуна</option>
                <option value="Рифи">🐠 Рифи</option>
                <option value="Вулкани">🌋 Вулкани</option>
                <option value="Гейзери">💨 Гейзери</option>
                <option value="Льодовики">❄️ Льодовики</option>
                <option value="Храми">🛕 Храми</option>
                <option value="Базари">🛍️ Базари</option>
                <option value="Пустеля">🏜️ Пустеля</option>
              </select>
              <input type="text" id="chips" class="form-input" placeholder="Або введіть свій тег через кому">
            </div>
            <div id="selected-tags" class="selected-tags"></div>
          </div>

          <div class="form-actions">
            <button type="button" class="btn-outline" onclick="closeModal()">Скасувати</button>
            <button type="submit" class="btn-primary">Зберегти</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="auth.js"></script>
  <script src="header.js"></script>
  <script src="admin.js"></script>
</body>
</html>
